[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bad-research"
version = "0.1.0"
description = "michael jackson bad — a deep-research agent that's bad (i.e. the best). A fork-and-enhance of hyperresearch."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11,<3.14"
authors = [{name = "Bad Research"}]
keywords = ["research", "deep-research", "llm", "agent", "claude", "retrieval", "rag"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "jinja2>=3.1",
    "platformdirs>=4.0",
    "Crawl4AI>=0.4",
    "pymupdf>=1.24",
    "httpx>=0.27",
    "anthropic>=0.40",
]

[project.optional-dependencies]
cohere = ["cohere>=5.0"]
exa = ["exa-py>=2.0.0"]
mcp = ["mcp>=1.6"]
all = ["bad-research[cohere,exa,mcp]"]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mypy>=1.8",
]

[project.scripts]
bad = "bad_research.cli:app"
badr = "bad_research.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/bad_research"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "RUF"]
ignore = ["E501", "B008", "B904", "E402", "N817", "SIM105"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
